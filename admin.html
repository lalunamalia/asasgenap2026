<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin NAFA</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#f6f8f5,#eef4f0);color:#142018}.app{max-width:1180px;margin:22px auto;padding:0 16px}.card,.panel{background:#fff;border:1px solid #d8e3dc;border-radius:20px;box-shadow:0 14px 34px rgba(47,79,70,.12);padding:18px;margin-bottom:14px}.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.login{width:min(440px,94vw);text-align:center}.badge{display:inline-block;background:#e6f0eb;border:1px solid #c9dcd3;color:#315b50;border-radius:999px;padding:8px 16px;font-weight:bold;margin-bottom:16px}h1{font-family:"Times New Roman",serif;margin:0 0 12px;color:#214b40}h2{margin:0 0 12px;color:#214b40}.muted{color:#5b6f67;line-height:1.5;font-size:14px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.col-3{grid-column:span 3}.col-4{grid-column:span 4}.col-6{grid-column:span 6}.col-12{grid-column:span 12}label{display:block;font-weight:bold;margin:8px 0 6px;color:#1f3b27}input,select,textarea{width:100%;padding:10px 11px;border:1.5px solid #98aa9d;border-radius:10px;font-size:14px;background:#fff;outline:none}input:focus,select:focus{border-color:#198754;box-shadow:0 0 0 3px rgba(25,135,84,.14)}button,.btn{border:0;border-radius:11px;padding:10px 15px;font-weight:bold;cursor:pointer;font-size:14px;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px}.green{background:#198754;color:#fff}.blue{background:#2563eb;color:#fff}.purple{background:#7c3aed;color:#fff}.red{background:#dc2626;color:#fff}.gray{background:#e8eee8;color:#16351f}.yellow{background:#facc15;color:#000}.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.table-wrap{overflow:auto;border-radius:14px;border:1px solid #d8e3dc}table{width:100%;border-collapse:collapse;background:#fff}th,td{border:1px solid #d9e2dd;padding:8px;font-size:13px;text-align:left}th{background:#edf8f0;color:#17492f}.stat{border-radius:16px;background:#f8fbf8;border:1px solid #d8e3dc;padding:14px}.stat b{font-size:24px;color:#146c43}.task{border:1px solid #d8e3dc;border-radius:16px;padding:14px;background:#fbfdfb}.hidden{display:none!important}.notice{padding:12px;border-radius:14px;background:#fff7cc;border:1px solid #e6c84f;color:#3f3106;margin-top:12px}.signature-pad{width:100%;height:170px;border:2px dashed #98aa9d;border-radius:14px;background:#fff;touch-action:none}@media(max-width:760px){.grid{grid-template-columns:1fr}.col-3,.col-4,.col-6,.col-12{grid-column:span 1}.topbar{align-items:flex-start}.card,.panel{padding:14px}}
</style></head><body><div class="app"><section class="panel topbar"><div><h1>Dashboard Admin</h1><div class="muted" id="who"></div></div><div class="actions"><button class="red" onclick="logout()">Logout</button></div></section><section class="grid"><div class="stat col-3"><span>Total Guru</span><br><b id="sGuru">0</b></div><div class="stat col-3"><span>Total Tugas</span><br><b id="sTugas">0</b></div><div class="stat col-3"><span>Data Nilai</span><br><b id="sNilai">0</b></div><div class="stat col-3"><span>Belum Terkirim</span><br><b id="sBelum">0</b></div></section><section class="panel"><h2>Tambah Penugasan Koreksi</h2><div class="grid"><div class="col-4"><label>Guru Korektor</label><select id="guru"></select></div><div class="col-4"><label>Jenjang</label><select id="jenjang"><option value="SMP">SMP</option><option value="SMA">SMA</option></select></div><div class="col-4"><label>Mata Pelajaran</label><select id="mapel"></select></div><div class="col-4"><label>Kelas</label><select id="kelas"></select></div><div class="col-4"><label>Absen Mulai</label><input id="mulai" type="number" min="1" value="1"></div><div class="col-4"><label>Absen Selesai</label><input id="selesai" type="number" min="1" value="6"></div></div><div class="actions"><button class="green" onclick="saveAssignment()">KIRIM TUGAS</button></div><div id="msg" class="notice hidden"></div></section><section class="panel"><h2>Daftar Tugas Koreksi</h2><div class="table-wrap"><table><thead><tr><th>Guru</th><th>Jenjang</th><th>Kelas</th><th>Mapel</th><th>Absen</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="tbodyTugas"></tbody></table></div></section></div><script src="config.js"></script><script src="data.js"></script><script>
const $=id=>document.getElementById(id);const API=window.NAFA_API_URL||"";let session=null,assignments=[],scores=[];
function auth(){session=JSON.parse(localStorage.getItem('nafaSession')||'null');if(!session||session.role!=='admin') location.href='index.html';$('who').textContent='Login sebagai '+session.name}
function logout(){localStorage.removeItem('nafaSession');location.href='index.html'}
function msg(t){$('msg').textContent=t;$('msg').classList.remove('hidden');setTimeout(()=>$('msg').classList.add('hidden'),3500)}
async function api(payload){if(!API)throw new Error('URL Apps Script belum diisi di config.js');const r=await fetch(API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({...payload,token:session.token})});const j=await r.json();if(!j.ok)throw new Error(j.message||'Gagal memproses data');return j}
function dataJenjang(){return window.NAFA_DATA[$('jenjang').value]}
function fill(el,arr,ph){el.innerHTML=ph?`<option value="">${ph}</option>`:'';arr.forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;el.appendChild(o)})}
function initForm(){fill($('guru'),window.NAFA_ACCOUNTS.filter(a=>a.role==='guru').map(a=>a.name+'|'+a.username),'-- Pilih Guru --');onJenjang();$('jenjang').onchange=onJenjang}
function onJenjang(){const d=dataJenjang();fill($('mapel'),d.mapel);fill($('kelas'),d.kelas)}
async function saveAssignment(){try{const [guruName,guruUsername]=($('guru').value||'|').split('|');if(!guruUsername)throw new Error('Pilih guru dulu');const payload={action:'createAssignment',guruUsername,guruName,jenjang:$('jenjang').value,mapel:$('mapel').value,kelas:$('kelas').value,absenMulai:+$('mulai').value,absenSelesai:+$('selesai').value};await api(payload);msg('Tugas berhasil disimpan');loadAll()}catch(e){msg(e.message)}}
async function deleteAssignment(id){if(!confirm('Hapus tugas ini?'))return;try{await api({action:'deleteAssignment',id});loadAll()}catch(e){msg(e.message)}}
async function loadAll(){try{const a=await api({action:'listAssignments'});assignments=a.assignments||[];const s=await api({action:'listScores'});scores=s.scores||[];render()}catch(e){msg(e.message)}}
function render(){const tb=$('tbodyTugas');tb.innerHTML='';assignments.forEach(t=>{const sent=scores.filter(x=>x.guruName===t.guruName&&x.jenjang===t.jenjang&&x.kelas===t.kelas&&x.mapel===t.mapel).length;const total=(+t.absenSelesai)-(+t.absenMulai)+1;tb.innerHTML+=`<tr><td>${t.guruName}</td><td>${t.jenjang}</td><td>${t.kelas}</td><td>${t.mapel}</td><td>${t.absenMulai}-${t.absenSelesai}</td><td>${sent}/${total} terkirim</td><td><button class="red" onclick="deleteAssignment('${t.id}')">Hapus</button></td></tr>`});$('sGuru').textContent=window.NAFA_ACCOUNTS.filter(a=>a.role==='guru').length;$('sTugas').textContent=assignments.length;$('sNilai').textContent=scores.length;let target=assignments.reduce((n,t)=>n+(+t.absenSelesai-(+t.absenMulai)+1),0);$('sBelum').textContent=Math.max(0,target-scores.length)}
auth();initForm();loadAll();
</script></body></html>
